name: Deploy to GitHub Pages

# This tells the action to run every time you push code to the "main" branch
on:
  push:
    branches: ["main"]

# Sets permissions for the GitHub token so it can deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ensures only one deployment runs at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This uploads all files in your repository root
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
